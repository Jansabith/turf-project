{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In Via Google | Turf Match</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-deep: #0a1a0f;
            --green-field: #0f2d1a;
            --green-bright: #22c55e;
            --green-glow: rgba(34,197,94,0.25);
            --white: #f0faf2;
            --muted: #6b9b7a;
            --border: rgba(34, 197, 94, 0.18);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: var(--green-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(15, 45, 26, 0.85);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            text-align: center;
            animation: slideIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        .brand-icon {
            width: 44px; height: 44px;
            background: var(--green-bright);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 20px var(--green-glow);
        }
        .brand-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--white);
            text-transform: uppercase;
        }
        .brand-name span { color: var(--green-bright); }
        .google-icon {
            width: 60px; height: 60px;
            background: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--white);
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }
        h2 span { color: var(--green-bright); }
        p {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn-continue {
            display: block;
            width: 100%;
            padding: 0.95rem;
            border: none;
            border-radius: 10px;
            background: var(--green-bright);
            color: var(--green-deep);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 1rem;
        }
        .btn-continue:hover {
            background: #4ade80;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(34,197,94,0.35);
        }
        .btn-cancel {
            display: block;
            width: 100%;
            padding: 0.85rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: transparent;
            color: var(--muted);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-cancel:hover {
            border-color: var(--green-bright);
            color: var(--white);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <div class="brand-icon">⚽</div>
            <div class="brand-name">Turf<span>Match</span></div>
        </div>

        <div class="google-icon">
            <svg width="28" height="28" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
        </div>

        <h2>Sign In Via <span>Google</span></h2>
        <p>You are about to sign in using your Google account. Click continue to proceed.</p>

        <form method="post" action="{% url 'google_login' %}">
            {% csrf_token %}
            <button type="submit" class="btn-continue">Continue with Google →</button>
        </form>

        <a href="{% url 'login' %}" class="btn-cancel">← Back to Login</a>
    </div>
</body>
</html>
